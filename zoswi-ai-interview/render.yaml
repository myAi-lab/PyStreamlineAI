services:
  - type: web
    name: zoswi-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALEMBIC_DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: zoswi-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: zoswi-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: zoswi-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: LINKEDIN_OAUTH_CLIENT_ID
        sync: false
      - key: LINKEDIN_OAUTH_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_OAUTH_REDIRECT_URI
        sync: false

  - type: worker
    name: zoswi-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: ALEMBIC_DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: zoswi-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: zoswi-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: zoswi-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: LINKEDIN_OAUTH_CLIENT_ID
        sync: false
      - key: LINKEDIN_OAUTH_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_OAUTH_REDIRECT_URI
        sync: false

  - type: redis
    name: zoswi-redis
    ipAllowList: []
