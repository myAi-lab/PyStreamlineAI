<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ZS Logo Options</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .wrap {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
    }
    h1 {
      margin: 0 0 6px 0;
      font-size: 1.4rem;
    }
    p {
      margin: 0 0 20px 0;
      color: #334155;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.06);
    }
    .card img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      display: block;
    }
    .id {
      margin-top: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #1e293b;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ZS Monogram Options</h1>
    <p>Pick one and I will make it the app logo + favicon.</p>
    <div class="grid">
      <div class="card"><img src="./zs_mark_01.svg" alt="zs_mark_01"><div class="id">zs_mark_01</div></div>
      <div class="card"><img src="./zs_mark_02.svg" alt="zs_mark_02"><div class="id">zs_mark_02</div></div>
      <div class="card"><img src="./zs_mark_03.svg" alt="zs_mark_03"><div class="id">zs_mark_03</div></div>
      <div class="card"><img src="./zs_mark_04.svg" alt="zs_mark_04"><div class="id">zs_mark_04</div></div>
      <div class="card"><img src="./zs_mark_05.svg" alt="zs_mark_05"><div class="id">zs_mark_05</div></div>
    </div>
  </div>
</body>
</html>
